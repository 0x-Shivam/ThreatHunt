<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Dashboard</title>
    <!-- Import Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        card: '#1e293b'
                    }
                }
            }
        }
    </script>
    </head>

    <body class="bg-dark text-slate-300 font-sans min-h-screen p-6">

        <div class="max-w-7xl mx-auto">

            <!-- Header -->
            <header class="mb-10 border-b border-slate-700 pb-5 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Vulnerability Dashboard</h1>
                <p class="text-slate-400 mt-1">Real-time threat analysis and attack surface monitoring.</p>
            </div>
            <div class="animate-pulse bg-green-500/20 text-green-400 px-4 py-2 rounded-full text-sm font-semibold border border-green-500/30">
                ● System Online
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-10">
            <div class="bg-card border border-red-500/30 p-5 rounded-xl shadow-lg relative overflow-hidden">
                <div class="absolute top-0 right-0 w-16 h-16 bg-red-500/10 rounded-bl-full"></div>
                <p class="text-red-400 text-sm font-bold uppercase tracking-wider mb-1">Critical</p>
                <p class="text-4xl font-extrabold text-white">{{ stats['CRITICAL'] }}</p>
            </div>
                <!-- High Card -->
            <div class="bg-card border border-orange-500/3 p-5 rounded-xl shadow-lg relative overflow-hidden">
                <div class="absolute top-0 right-0 w-16 h-16 bg-orange-500/10 rounded-bl-full"></div>
                <p class="text-orange-400 text-sm font-bold uppercase tracking-wider mb-1">High</p>

                <p class="text-4xl font-extrabold text-white">{{ stats['HIGH'] }}</p>
            </div>

                <!-- Medium Card -->
            <div class="bg-card border border-yellow-500/30 p-5 rounded-xl shadow-lg relative overflow-hidden">
                <p class="text-yellow-400 text-sm font-bold uppercase tracking-wider mb-1">Medium</p>
                <p class="text-4xl font-extrabold text-white">{{ stats['MEDIUM'] }}</p>
            </div>



            <!-- Low Card -->
            <div class="bg-card border border-blue-500/30 p-5 rounded-xl shadow-lg relative overflow-hidden">
                <p class="text-blue-400 text-sm font-bold uppercase tracking-wider mb-1">Low</p>
                <p class="text-4xl font-extrabold text-white">{{ stats['LOW'] }}</p>
            </div>


            <!-- Info Card -->
            <div class="bg-card border border-slate-600 p-5 rounded-xl shadow-lg relative overflow-hidden">
                <p class="text-slate-400 text-sm font-bold uppercase tracking-wider mb-1">Info</p>
                <p class="text-4xl font-extrabold text-white">{{ stats['INFO'] }}</p>
            </div>
        </div>


        






        </div>
        
    

    
    
    </body>
